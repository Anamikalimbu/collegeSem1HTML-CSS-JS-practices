<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact US</title>
    <style>
        /* Basic styling for the contact form */
        body{
            font-family: sans-serif;
            margin: 20px;
        }
        label{
            display:block;
            margin-top: 10px;
            margin-bottom: 5px;
        }
        input[type="text"],
        input[type="email"],
        textarea{
            width: 90%;
            max-width: 400px;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        input[type="checkbox"]{
            margin-right: 5px;
        }
        button, input[type="submit"]{
            background-color: #007bff;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 15px;
        }
        button:hover, input[type='submit']:hover{
            background-color: #0056b3;
        }
        .from-group{
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
  <h1>Contact Us</h1>  
  <p>Please fill out the form below to get in touch.</p>
  <form method="post" action="#">
    <div class="form-group">
        <label for="fullName">Full Name:</label>
        <input type="text" id="fullName" name="fullName" placeholder="e.g., John Doe" required>
    </div>
    <div class="form-group">
        <label for="email">Email Address:</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
    </div>
    <div class="form-group">
        <label for="subject">Subject:</label>
        <input type="text" id="subject" name="subject" placeholder="Regarding...">
    </div>
    <div class="form-group">
        <label for="message">Message:</label>
        <textarea name="message" id="checkbox" rows="6" placeholder="Your message here..." required></textarea>
    </div>
    <div>
        <button type="submit">Send Message</button>
        <!-- Or use: <input type="submit" value="Send Message">  -->
    </div>
    
  </form>
</body>
</html>
